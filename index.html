    <!-- Fonts: Fraunces (serif display), Geist + Geist Mono (sans + mono), Amiri (Arabic serif), Cairo (Arabic sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Theme init script — set theme BEFORE React loads to prevent FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
          var lang = localStorage.getItem('lang') || 'en';
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-cream-200 text-ink-800 dark:bg-ink-800 dark:text-cream-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
